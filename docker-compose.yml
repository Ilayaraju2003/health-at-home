version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: backend-app
    env_file:
      - ./backend/.env
    ports:
      - "5000:5000"
    restart: unless-stopped

  frontend:
    build:
      context: ./mobile
    container_name: mobile-app
    ports:
      - "8081:80"
    depends_on:
      - backend
    restart: unless-stopped
